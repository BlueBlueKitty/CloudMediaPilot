services:
  cloudmediapilot:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cloudmediapilot
    environment:
      SYSTEM_USERNAME: ${SYSTEM_USERNAME:-admin}
      SYSTEM_PASSWORD: ${SYSTEM_PASSWORD:-admin}
    ports:
      - "1315:1315"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
